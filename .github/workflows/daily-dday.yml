name: Daily D-Day Update

on:
  schedule:
    # 매일 한국 시간(KST) 밤 10시 30분에 자동 실행
    - cron: '30 22 * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch: # 수동 테스트용 버튼

permissions:
  contents: write

jobs:
  update-dday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Yesterday's Commits and Update D-Day
        run: |
          # 1. 환경 설정
          export TZ='Asia/Seoul'

          YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%d')
          TODAY=$(date +'%Y-%m-%d')

          echo "검사 대상 날짜: $YESTERDAY"
          echo "검사 범위: ${YESTERDAY} 00:00:00 ~ ${TODAY} 00:00:00"

          # 2. 전날 내가 남긴 커밋 개수 확인
          # github-actions 봇 커밋은 제외
          COMMIT_COUNT=$(git log --all \
            --since="${YESTERDAY} 00:00:00" \
            --until="${TODAY} 00:00:00" \
            --format="%an" | grep -v -i "github-actions" | wc -l)

          echo "전날 커밋 횟수: $COMMIT_COUNT"

          # 3. README.md에서 현재 D-Day 추출
          CURRENT_DDAY=$(grep -oP '(?<=\(D\+)\d+(?=\))' README.md | head -n 1 || echo "30")
          echo "현재 D-Day: D+$CURRENT_DDAY"

          # 4. 전날 커밋이 있으면 D-Day 1 증가
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "전날 커밋 기록이 있습니다. D-Day를 1 증가시킵니다."
            NEW_DDAY=$((CURRENT_DDAY + 1))

            sed -i "s/(D+${CURRENT_DDAY})/(D+${NEW_DDAY})/g" README.md
          else
            echo "전날 커밋 기록이 없습니다. D-Day를 유지합니다."
            NEW_DDAY=$CURRENT_DDAY
          fi

          echo "NEW_DDAY=$NEW_DDAY" >> $GITHUB_ENV

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          # 변경사항이 있을 때만 커밋 및 푸시
          if git diff --cached --quiet; then
            echo "변경사항이 없습니다. 커밋하지 않습니다."
          else
            git commit -m "docs: 전날 커밋 달성 D+${NEW_DDAY} 업데이트"
            git push
          fi